backend:
  name: github
  repo: inclusive-materials/inclusive.materials
  branch: main
  base_url: https://sveltia-cms-auth.inclusivematerials.workers.dev
  app_id: Ov23liOcOoErrI70HotZ

media_folder: "docs/photos"
public_folder: "/photos"

collections:

  - name: "site_settings"
    label: "🏠 Home Page"
    files:
      - name: "homepage"
        label: "Home Page Content"
        file: "docs/_data/homepage.json"
        fields:
          - {label: "Hero — Tag Line", name: "hero_tagline", widget: "string"}
          - {label: "Hero — Main Title", name: "hero_title", widget: "string"}
          - {label: "Hero — Subtitle", name: "hero_subtitle", widget: "string"}
          - {label: "Hero — Description", name: "hero_description", widget: "text"}
          - {label: "What I Create — Title", name: "what_i_create_title", widget: "string"}
          - {label: "What I Create — Description", name: "what_i_create_description", widget: "text"}

  - name: "featured_resources"
    label: "⭐ Featured Resources"
    folder: "docs/_data/resources"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Short Description", name: "description", widget: "text"}
      - {label: "Price", name: "price", widget: "string", hint: "e.g. $4.99"}
      - {label: "Badge", name: "badge", widget: "string", default: "Featured", required: false}
      - {label: "Cover Image", name: "image", widget: "image", required: false}
      - {label: "Shop Link / URL", name: "url", widget: "string", default: "./shop.html"}
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: true}

  - name: "blog"
    label: "📝 Blog Articles"
    folder: "docs/_data/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Summary", name: "summary", widget: "text"}
      - {label: "Cover Image", name: "image", widget: "image", required: false}
      - {label: "Full Article Body", name: "body", widget: "markdown"}
      - {label: "Published", name: "published", widget: "boolean", default: true}

  - name: "about"
    label: "👩‍🏫 About Page"
    files:
      - name: "about"
        label: "About Content"
        file: "docs/_data/about.json"
        fields:
          - {label: "Your Name", name: "name", widget: "string"}
          - {label: "Your Title / Role", name: "role", widget: "string"}
          - {label: "Bio (short)", name: "bio_short", widget: "text"}
          - {label: "Bio (full)", name: "bio_full", widget: "markdown"}
          - {label: "Profile Photo", name: "photo", widget: "image", required: false}
          - {label: "Years of Experience", name: "years_experience", widget: "string", required: false}

  - name: "contact"
    label: "📬 Contact Info"
    files:
      - name: "contact"
        label: "Contact Details"
        file: "docs/_data/contact.json"
        fields:
          - {label: "Email Address", name: "email", widget: "string"}
          - {label: "Contact Page Heading", name: "heading", widget: "string"}
          - {label: "Contact Page Intro Text", name: "intro", widget: "text"}
          - {label: "Instagram URL", name: "instagram", widget: "string", required: false}
          - {label: "Facebook URL", name: "facebook", widget: "string", required: false}
          - {label: "Pinterest URL", name: "pinterest", widget: "string", required: false}
